<!DOCTYPE html>
<html>
<head>
    <title>cai.watt</title>

    <style>
        body {
            font-family: "Times New Roman", serif;
            text-align: center;
            color: white;

            background-image: url("dfbf2dd0-0a9f-4433-bd6b-0e214d4d965c.jfif");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .page {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            width: 260px;
            border-radius: 10px;
            border: none;
            background: #b0b0b0;
            color: black;
            font-family: "Times New Roman", serif;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #f5f5f5;
            color: #222;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        #hasil {
            margin-top: 20px;
            font-size: 18px;
        }

        #loading {
            display: none;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }

        #boostBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 999;
            display: none;
        }

        #fpsText {
            margin-top: 15px;
            font-size: 16px;
            color: white;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<button id="boostBtn" onclick="boost()">percepat proses</button>

<div id="home" class="page active">
    <h2>⚡ cai.watt</h2>

    <select id="cpuSelect" onchange="syncCPU()">
        <option value="">Pilih CPU</option>
        <option value="i5">Intel i5</option>
        <option value="i7">Intel i7</option>
        <option value="ryzen 5">Ryzen 5</option>
        <option value="ryzen 7">Ryzen 7</option>
    </select>

    <input id="cpu" placeholder="atau ketik CPU manual"><br>

    <select id="gpuSelect" onchange="syncGPU()">
        <option value="">Pilih GPU</option>
        <option value="gtx 1650">GTX 1650</option>
        <option value="gtx 1660">GTX 1660</option>
        <option value="rtx 3060">RTX 3060</option>
        <option value="rtx 4060">RTX 4060</option>
    </select>

    <input id="gpu" placeholder="atau ketik GPU manual"><br>

    <button onclick="cek()">Cek Sekarang</button>
    <button onclick="bukaTutorial()">📘 Cara Cek CPU/GPU</button>

    <div id="fpsText">
    💻🖥 chek fps game di pc kamu 🖥💻
    </div>

    <div id="loading">⏳ Loading... tunggu bentar</div>

    <p id="hasil"></p>
</div>

<div id="tutorial" class="page">
    <h2>📘 Tutorial Cek CPU & GPU</h2>

    <p>1. Tekan Windows + R</p>
    <p>2. Ketik dxdiag</p>
    <p>3. Lihat Processor = CPU</p>
    <p>4. Tab Display = GPU</p>

    <br>
    <button onclick="kembali()">⬅️ Kembali</button>
</div>

<script>
let baseTime = 3000;
let reduce = 0;
let clickCount = 0;

function showLoading() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("boostBtn").style.display = "block";
}

function hideLoading() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("boostBtn").style.display = "none";
    document.getElementById("loading").innerHTML = "⏳ Loading... tunggu bentar";
    reduce = 0;
    clickCount = 0;
}

function updateLoading(sec) {
    if (sec === 3) {
        document.getElementById("loading").innerHTML = "⚙️ memproses sistem... (3)";
    } else if (sec === 2) {
        document.getElementById("loading").innerHTML = "🔧 optimasi data... (2)";
    } else if (sec === 1) {
        document.getElementById("loading").innerHTML = "⚡ hampir selesai... (1)";
    }
}

function boost() {
    if (reduce < 2000) {
        reduce += 1000;
        clickCount++;
    }

    let btn = document.getElementById("boostBtn");

    if (clickCount === 1) btn.innerText = "percepat (1 detik)";
    else if (clickCount === 2) btn.innerText = "2 detik boost";
    else if (clickCount === 3) btn.innerText = "woi udah woi";
    else if (clickCount === 4) btn.innerText = "bang udah bang";
    else if (clickCount === 5) btn.innerText = "ampun bangg";
    else if (clickCount === 6) btn.innerText = "udah bang 😭";
    else if (clickCount === 7) btn.innerText = "pasrah";
    else if (clickCount === 8) btn.innerText = "💀DEATH💀";
    else if (clickCount === 9) btn.innerText = "⚰ dikubur ⚰";
    else btn.innerText = "🪦";
}

function bukaTutorial() {
    showLoading();
    setTimeout(() => {
        document.getElementById("home").classList.remove("active");
        document.getElementById("tutorial").classList.add("active");
        hideLoading();
    }, 800);
}

function kembali() {
    document.getElementById("tutorial").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

function syncCPU() {
    document.getElementById("cpu").value = document.getElementById("cpuSelect").value;
}

function syncGPU() {
    document.getElementById("gpu").value = document.getElementById("gpuSelect").value;
}

function cek() {
    showLoading();

    let delay = baseTime - reduce;

    let sec = 3;
    updateLoading(sec);

    let interval = setInterval(() => {
        sec--;
        if (sec > 0) updateLoading(sec);
        else clearInterval(interval);
    }, 1000);

    setTimeout(() => {

        let cpu = document.getElementById("cpu").value.toLowerCase();
        let gpu = document.getElementById("gpu").value.toLowerCase();

        let cpu_power = 65;
        if (cpu.includes("i5")) cpu_power = 95;
        else if (cpu.includes("i7")) cpu_power = 125;
        else if (cpu.includes("ryzen 5")) cpu_power = 100;
        else if (cpu.includes("ryzen 7")) cpu_power = 135;

        let gpu_power = 80;
        if (gpu.includes("gtx 1650")) gpu_power = 85;
        else if (gpu.includes("gtx 1660")) gpu_power = 110;
        else if (gpu.includes("rtx 3060")) gpu_power = 180;
        else if (gpu.includes("rtx 4060")) gpu_power = 220;

        let total = cpu_power + gpu_power + 70;

        let hasil = "⚡ Estimasi Watt PC: " + total + " W<br>";

        if (total < 200) hasil += "💡 PC ringan";
        else if (total < 400) hasil += "🔥 PC gaming";
        else hasil += "⚠️ PC berat";

        document.getElementById("hasil").innerHTML = hasil;

        hideLoading();

    }, delay);
}
</script>

</body>
</html>
