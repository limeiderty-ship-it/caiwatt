<!DOCTYPE html>
<html>
<head>
    <title>cai.watt</title>

    <style>
        body {
            font-family: "Times New Roman", serif;
            text-align: center;
            color: white;

            background-image: url("dfbf2dd0-0a9f-4433-bd6b-0e214d4d965c.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* PAGE */
        .page { display: none; padding: 20px; }
        .active { display: block; }

        h2 {
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }

        input, select {
            padding: 10px;
            margin: 10px;
            width: 260px;
            border-radius: 10px;
            border: none;
            background: #b0b0b0;
            font-family: "Times New Roman";
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #f5f5f5;
            color: #222;
            font-weight: bold;
            cursor: pointer;
        }

        #loading {
            display: none;
        }

        #boostBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            display: none;
        }

        /* WATERMARK */
        #watermark {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
        }

        .verified {
            color: #00bfff;
        }

        /* RUNAWAY BUTTON */
        #fakeClose {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            border-radius: 6px;
            cursor: pointer;
            z-index: 9999;
        }

        #fakeClose::after {
            content: "✖";
            color: white;
            font-size: 18px;
            position: absolute;
            top: 7px;
            left: 11px;
        }

        /* PRANK TEXT */
        #prankText {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 30px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }

        #prankText.show {
            animation: pop 0.4s ease forwards;
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div id="fakeClose"></div>
<div id="prankText"></div>

<button id="boostBtn" onclick="boost()">percepat proses</button>

<div id="home" class="page active">
    <h2>⚡ cai.watt</h2>

    <select id="cpuSelect" onchange="syncCPU()">
        <option value="">CPU</option>
        <option value="i5">i5</option>
        <option value="i7">i7</option>
        <option value="ryzen 5">ryzen 5</option>
        <option value="ryzen 7">ryzen 7</option>
    </select>

    <input id="cpu" placeholder="manual cpu"><br>

    <select id="gpuSelect" onchange="syncGPU()">
        <option value="">GPU</option>
        <option value="gtx 1650">gtx 1650</option>
        <option value="rtx 3060">rtx 3060</option>
    </select>

    <input id="gpu" placeholder="manual gpu"><br>

    <button onclick="cek()">Cek Sekarang</button>
    <button onclick="bukaTutorial()">Tutorial</button>

    <div id="loading">Loading...</div>
    <p id="hasil"></p>
</div>

<div id="tutorial" class="page">
    <h2>Tutorial</h2>
    <p>Windows + R → dxdiag</p>
    <button onclick="kembali()">Back</button>
</div>

<!-- WATERMARK -->
<div id="watermark">
    this web by zuhair (Belajar Ai)
    <span class="verified">✔ Ai ini berbayar</span>
</div>

<script>
let baseTime = 3000;
let reduce = 0;
let click = 0;

/* BOOST */
function boost(){
    if(reduce < 2000) reduce += 1000;
    document.getElementById("boostBtn").innerText = "boosted";
}

/* CPU GPU SYNC */
function syncCPU(){
    cpu.value = cpuSelect.value;
}
function syncGPU(){
    gpu.value = gpuSelect.value;
}

/* CHECK */
function cek(){
    document.getElementById("loading").style.display = "block";

    setTimeout(()=>{
        document.getElementById("hasil").innerText = "OK PC TERDETEKSI";
        document.getElementById("loading").style.display = "none";
    }, baseTime - reduce);
}

/* NAV */
function bukaTutorial(){
    home.classList.remove("active");
    tutorial.classList.add("active");
}
function kembali(){
    tutorial.classList.remove("active");
    home.classList.add("active");
}

/* RUNAWAY BUTTON */
const btn = document.getElementById("fakeClose");
const text = document.getElementById("prankText");

btn.addEventListener("mouseover", ()=>{
    let x = Math.random()*(window.innerWidth-60);
    let y = Math.random()*(window.innerHeight-60);
    btn.style.left = x+"px";
    btn.style.top = y+"px";
    btn.style.right = "auto";
});

btn.addEventListener("click", ()=>{
    click++;

    if(click===1) text.innerText="eitsss tidak kenaa";
    else if(click===2) text.innerText="yaudah nih terakhir";
    else {
        text.innerText="WEB CLOSED 💀";
        setTimeout(()=>document.body.innerHTML="<h1 style='color:white'>CLOSED</h1>",1000);
    }

    text.classList.remove("show");
    void text.offsetWidth;
    text.classList.add("show");
});
</script>

</body>
</html>
